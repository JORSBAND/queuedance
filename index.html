<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Графік репетицій</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-10">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const { useState, useEffect, useMemo } = React;

        // Посилання на сайт для кнопки в Telegram
        const SITE_URL = "https://vhrchat.firebaseapp.com"; 

        const firebaseConfig = {
            apiKey: "AIzaSyCm8nZvhps4yeYDzPNyKLI_PvadAOeYI20",
            authDomain: "vhrchat.firebaseapp.com",
            projectId: "vhrchat",
            storageBucket: "vhrchat.firebasestorage.app",
            messagingSenderId: "1039293838718",
            appId: "1:1039293838718:web:b74fddda402267040bef2f",
            measurementId: "G-R9XY6JRZMF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const COLLECTION_NAME = 'rehearsals';

        const CLASSES = ["5А", "5Б", "5В", "6А", "6Б", "7А", "7Б"];
        const HALLS = [
            { id: 'choreography', name: 'Хореографічний' },
            { id: 'assembly', name: 'Актовий' }
        ];
        const DANCE_TYPES = [
            { id: 'waltz', name: 'Вальс' },
            { id: 'general', name: 'Загальний танець' }
        ];
        const DAYS = [
            { id: 1, name: 'Понеділок', short: 'ПН' },
            { id: 2, name: 'Вівторок', short: 'ВТ' },
            { id: 3, name: 'Середа', short: 'СР' },
            { id: 4, name: 'Четвер', short: 'ЧТ' },
            { id: 5, name: 'П\'ятниця', short: 'ПТ' }
        ];
        const LESSON_TIMES = {
            1: "08:30 - 09:15",
            2: "09:25 - 10:10",
            3: "10:30 - 11:15",
            4: "11:25 - 12:10",
            5: "12:30 - 13:15",
            6: "13:25 - 14:10",
            7: "14:20 - 15:05",
            8: "15:10 - 15:55",
            9: "16:00 - 16:45"
        };
        const ADMIN_PASSWORD = "44442222";

        const IconUser = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        const IconMapPin = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>;
        const IconTrash = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
        const IconPlus = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
        const IconInfo = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
        const IconShield = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>;
        const IconChevronLeft = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"/></svg>;
        const IconChevronRight = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"/></svg>;
        const IconClock = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
        const IconTelegram = ({ size=24, className="" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;

        const TG_BOT_TOKEN = "8790781183:AAHL1o0mrmqFSRt63mXmS1lNvAYZWJMnvlE";

        const getWeekInfo = (offset) => {
            const d = new Date();
            const day = d.getDay();
            const diff = d.getDate() - day + (day === 0 ? -6 : 1);
            d.setDate(diff);
            d.setHours(0,0,0,0);
            
            d.setDate(d.getDate() + offset * 7);
            
            const monday = new Date(d);
            const friday = new Date(d);
            friday.setDate(friday.getDate() + 4);

            const target = new Date(monday);
            target.setDate(target.getDate() + 3 - (target.getDay() + 6) % 7);
            const week1 = new Date(target.getFullYear(), 0, 4);
            const weekNumber = 1 + Math.round(((target.getTime() - week1.getTime()) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
            const key = `${target.getFullYear()}-W${weekNumber}`;

            const formatD = (date) => `${date.getDate().toString().padStart(2, '0')}.${(date.getMonth() + 1).toString().padStart(2, '0')}`;

            return {
                key,
                label: `Тижд. ${weekNumber} (${formatD(monday)}-${formatD(friday)})`,
                mondayMonth: monday.getMonth(),
                mondayYear: monday.getFullYear()
            };
        };

        function App() {
            const [user, setUser] = useState(null);
            const [profile, setProfile] = useState(null);
            const [isAdmin, setIsAdmin] = useState(() => localStorage.getItem('rehearsals_admin') === 'true');
            const [rehearsals, setRehearsals] = useState([]);
            
            const [weekOffset, setWeekOffset] = useState(0); 
            const [selectedDay, setSelectedDay] = useState(new Date().getDay() >= 1 && new Date().getDay() <= 5 ? new Date().getDay() : 1);
            const [selectedHall, setSelectedHall] = useState(HALLS[0].id);
            const [loading, setLoading] = useState(true);
            
            const [authModalOpen, setAuthModalOpen] = useState(false);
            const [adminLoginModalOpen, setAdminLoginModalOpen] = useState(false);
            const [bookingModal, setBookingModal] = useState({ open: false, lesson: null });
            const [messageModal, setMessageModal] = useState({ open: false, title: '', text: '' });
            const [adminCustomEventText, setAdminCustomEventText] = useState('');

            const [tgModalOpen, setTgModalOpen] = useState(false);
            const [tgChatId, setTgChatId] = useState(() => localStorage.getItem('tg_chat_id'));
            const [tgChatTitle, setTgChatTitle] = useState(() => localStorage.getItem('tg_chat_title'));
            const [tgLoading, setTgLoading] = useState(false);
            const [tgWeekOffset, setTgWeekOffset] = useState(0);
            const [tgDays, setTgDays] = useState(['all']);
            const [activeTgMessage, setActiveTgMessage] = useState(false);

            const currentWeekInfo = useMemo(() => getWeekInfo(weekOffset), [weekOffset]);
            
            // Список доступних тижнів (дозволяємо до кінця квітня - місяць 3)
            const availableWeeks = useMemo(() => {
                const weeks = [];
                for(let i = 0; i <= 15; i++) {
                    const wInfo = getWeekInfo(i);
                    // Дозволяємо всі тижні, що починаються у квітні (3) або раніше
                    if (wInfo.mondayMonth > 3 && wInfo.mondayYear >= new Date().getFullYear()) {
                        break;
                    }
                    weeks.push({ offset: i, ...wInfo });
                }
                return weeks;
            }, []);

            useEffect(() => {
                if(tgModalOpen) {
                    setTgWeekOffset(weekOffset);
                    setTgDays([selectedDay]);
                }
            }, [tgModalOpen, weekOffset, selectedDay]);

            const nextWeekInfo = useMemo(() => getWeekInfo(weekOffset + 1), [weekOffset]);
            const isNextWeekLimit = nextWeekInfo.mondayMonth > 3 && nextWeekInfo.mondayYear >= new Date().getFullYear();

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        await signInAnonymously(auth);
                    } catch (error) {
                        console.error("Помилка авторизації:", error);
                        showMessage("Помилка", "Не вдалося підключитися до сервера. Перевірте налаштування Firebase.");
                    }
                };

                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                    if (currentUser) {
                        const savedProfile = localStorage.getItem('rehearsal_profile');
                        if (savedProfile) {
                            setProfile(JSON.parse(savedProfile));
                        } else {
                            setAuthModalOpen(true);
                        }
                    } else {
                        setLoading(false);
                    }
                });

                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const rehearsalsRef = collection(db, COLLECTION_NAME);
                
                const unsubscribe = onSnapshot(rehearsalsRef, (snapshot) => {
                    const data = [];
                    let hasActiveTgMessage = false;
                    
                    snapshot.docs.forEach(doc => {
                        if (doc.id === 'tg_config') {
                            hasActiveTgMessage = true;
                        } else {
                            data.push({ id: doc.id, ...doc.data() });
                        }
                    });
                    
                    setRehearsals(data);
                    setActiveTgMessage(hasActiveTgMessage);
                    setLoading(false);
                }, (error) => {
                    console.error("Помилка завантаження даних:", error);
                    setLoading(false);
                });

                return () => unsubscribe();
            }, [user]);

            const saveProfile = () => {
                const classSelect = document.getElementById('class-select').value;
                const nameInput = document.getElementById('name-input').value;

                if (!nameInput.trim() || !classSelect) {
                    showMessage("Увага", "Будь ласка, введіть своє ім'я та оберіть клас.");
                    return;
                }
                const newProfile = { name: nameInput.trim(), className: classSelect };
                localStorage.setItem('rehearsal_profile', JSON.stringify(newProfile));
                setProfile(newProfile);
                setAuthModalOpen(false);
            };

            const logOut = () => {
                localStorage.removeItem('rehearsal_profile');
                setProfile(null);
                setIsAdmin(false);
                localStorage.removeItem('rehearsals_admin');
                setAuthModalOpen(true);
            };

            const handleAdminLogin = () => {
                const pwd = document.getElementById('admin-pwd-input').value;
                if (pwd === ADMIN_PASSWORD) {
                    setIsAdmin(true);
                    localStorage.setItem('rehearsals_admin', 'true');
                    setAdminLoginModalOpen(false);
                    showMessage("Успіх", "Ви увійшли як Адміністратор.");
                } else {
                    showMessage("Помилка", "Невірний пароль.");
                }
            };

            const toggleAdminLogin = () => {
                if (isAdmin) {
                    setIsAdmin(false);
                    localStorage.removeItem('rehearsals_admin');
                    showMessage("Інфо", "Ви вийшли з режиму Адміністратора.");
                } else {
                    setAdminLoginModalOpen(true);
                }
            };

            const showMessage = (title, text) => {
                setMessageModal({ open: true, title, text });
            };

            const handleSlotClick = (lessonNumber) => {
                if (!isAdmin) {
                    const classBookingsToday = rehearsals.filter(r => 
                        r.weekKey === currentWeekInfo.key && 
                        r.day === selectedDay && 
                        r.className === profile.className &&
                        r.danceType !== 'custom'
                    );

                    if (classBookingsToday.length >= 2) {
                        showMessage("Ліміт вичерпано", `Клас ${profile.className} вже забронював максимум (2) репетиції на цей день.`);
                        return;
                    }
                }

                setAdminCustomEventText('');
                setBookingModal({ open: true, lesson: lessonNumber });
            };

            const triggerTgUpdate = async () => {
                try {
                    const tgConfigRef = doc(db, COLLECTION_NAME, 'tg_config');
                    const tgSnap = await getDoc(tgConfigRef);
                    
                    if (tgSnap.exists()) {
                        const config = tgSnap.data();
                        if (!config.chatId || !config.messageId) return;

                        const snap = await getDocs(collection(db, COLLECTION_NAME));
                        const allR = snap.docs
                            .map(d => ({id: d.id, ...d.data()}))
                            .filter(d => d.id !== 'tg_config');

                        const text = generateTgText(config.weekLabel, config.weekKey, config.days, allR);
                        
                        const replyMarkup = {
                            inline_keyboard: [[{ text: "👉 Відкрити графік на сайті", url: SITE_URL }]]
                        };

                        await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/editMessageText`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                chat_id: config.chatId,
                                message_id: config.messageId,
                                text: text,
                                parse_mode: 'HTML',
                                reply_markup: replyMarkup
                            })
                        });
                    }
                } catch (e) {
                    console.error("Помилка оновлення Telegram:", e);
                }
            };

            const confirmBooking = async () => {
                if (!user || !profile || !bookingModal.lesson) return;

                let finalClassName = profile.className;
                let finalResponsibleName = profile.name;
                let finalDanceType = 'general';

                if (isAdmin && adminCustomEventText.trim() !== '') {
                    finalClassName = adminCustomEventText.trim();
                    finalResponsibleName = 'Адміністрація';
                    finalDanceType = 'custom';
                } else {
                    const selectedTypeInput = document.querySelector('input[name="danceType"]:checked');
                    if (selectedTypeInput) {
                        finalDanceType = selectedTypeInput.value;
                    }
                }

                const newBooking = {
                    weekKey: currentWeekInfo.key,
                    day: selectedDay,
                    lesson: bookingModal.lesson,
                    hall: selectedHall,
                    danceType: finalDanceType,
                    className: finalClassName,
                    responsibleName: finalResponsibleName,
                    uid: user.uid,
                    createdAt: Date.now()
                };

                try {
                    await addDoc(collection(db, COLLECTION_NAME), newBooking);
                    setBookingModal({ open: false, lesson: null });
                    await triggerTgUpdate();
                } catch (error) {
                    console.error("Помилка бронювання:", error);
                    showMessage("Помилка", "Бронювання не вдалося.");
                }
            };

            const handleDelete = async (bookingId) => {
                try {
                    await deleteDoc(doc(db, COLLECTION_NAME, bookingId));
                    await triggerTgUpdate();
                } catch (error) {
                    console.error("Помилка видалення:", error);
                    showMessage("Помилка", "Не вдалося видалити репетицію.");
                }
            };

            const findTgGroup = async () => {
                setTgLoading(true);
                try {
                    const res = await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/getUpdates`);
                    const data = await res.json();
                    if (data.ok && data.result.length > 0) {
                        const groupUpdate = data.result.reverse().find(u => u.message && (u.message.chat.type === 'group' || u.message.chat.type === 'supergroup'));
                        if (groupUpdate) {
                            const id = groupUpdate.message.chat.id;
                            const title = groupUpdate.message.chat.title;
                            localStorage.setItem('tg_chat_id', id);
                            localStorage.setItem('tg_chat_title', title);
                            setTgChatId(id);
                            setTgChatTitle(title);
                            showMessage("Успіх", `Групу "${title}" знайдено!`);
                        } else {
                            showMessage("Помилка", "Не знайдено групу. Напишіть /start.");
                        }
                    } else {
                         showMessage("Помилка", "Напишіть команду /start у групу.");
                    }
                } catch (e) {
                     showMessage("Помилка", "Помилка з'єднання.");
                }
                setTgLoading(false);
            };

            const generateTgText = (targetWeekLabel, targetWeekKey, targetDays, allRehearsals) => {
                let text = `🗓 <b>Графік репетицій</b>\n`;
                text += `Тиждень: ${targetWeekLabel}\n`;

                const daysToProcess = targetDays.includes('all') ? DAYS : DAYS.filter(d => targetDays.includes(d.id));

                daysToProcess.forEach(day => {
                    text += `\n📅 <b>${day.name.toUpperCase()}</b>\n`;
                    HALLS.forEach(hall => {
                        text += `\n📍 <i>${hall.name} зал:</i>\n`;
                        for (let lesson = 1; lesson <= 9; lesson++) {
                            const r = allRehearsals.find(x => x.weekKey === targetWeekKey && x.day === day.id && x.hall === hall.id && x.lesson === lesson);
                            if (r) {
                                let danceName = r.danceType === 'custom' ? 'Спеціальна подія' : (DANCE_TYPES.find(d=>d.id===r.danceType)?.name || '');
                                text += `• ${lesson} урок (${LESSON_TIMES[lesson]}) — <b>${r.className}</b> (${danceName})\n`;
                            } else {
                                text += `• ${lesson} урок (${LESSON_TIMES[lesson]}) — <i>Вільний</i> ✅\n`;
                            }
                        }
                    });
                });
                return text;
            };

            const sendTgMessage = async () => {
                if (!tgChatId) return;
                const targetWeekInfo = getWeekInfo(tgWeekOffset);
                const text = generateTgText(targetWeekInfo.label, targetWeekInfo.key, tgDays, rehearsals);
                
                const replyMarkup = {
                    inline_keyboard: [[{ text: "👉 Відкрити графік на сайті", url: SITE_URL }]]
                };

                setTgLoading(true);
                try {
                    const res = await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            chat_id: tgChatId,
                            text: text,
                            parse_mode: 'HTML',
                            reply_markup: replyMarkup
                        })
                    });
                    const data = await res.json();
                    
                    if(data.ok) {
                        await setDoc(doc(db, COLLECTION_NAME, 'tg_config'), {
                            chatId: tgChatId,
                            messageId: data.result.message_id,
                            weekKey: targetWeekInfo.key,
                            weekLabel: targetWeekInfo.label,
                            days: tgDays,
                            updatedAt: Date.now(),
                            uid: user?.uid || "admin"
                        });
                        showMessage("Успіх", "Графік відправлено!");
                        setTgModalOpen(false);
                    } else {
                        showMessage("Помилка", "Бот не в групі.");
                    }
                } catch (e) {
                    showMessage("Помилка", "Помилка відправки.");
                }
                setTgLoading(false);
            };

            const deleteTgMessage = async () => {
                setTgLoading(true);
                try {
                    const tgConfigRef = doc(db, COLLECTION_NAME, 'tg_config');
                    const tgSnap = await getDoc(tgConfigRef);
                    if (tgSnap.exists()) {
                        const config = tgSnap.data();
                        if (config.chatId && config.messageId) {
                            await fetch(`https://api.telegram.org/bot${TG_BOT_TOKEN}/deleteMessage`, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({ chat_id: config.chatId, message_id: config.messageId })
                            });
                        }
                        await deleteDoc(tgConfigRef);
                        showMessage("Успіх", "Повідомлення видалено!");
                        setTgModalOpen(false);
                    }
                } catch (error) {
                    showMessage("Помилка", "Не вдалося видалити.");
                }
                setTgLoading(false);
            };

            const currentViewRehearsals = rehearsals.filter(r => 
                r.weekKey === currentWeekInfo.key && 
                r.day === selectedDay && 
                r.hall === selectedHall
            );

            if (loading) {
                return <div className="min-h-screen flex items-center justify-center text-indigo-600 font-bold text-lg">Завантаження...</div>;
            }

            return (
                <div>
                    <header className="bg-white shadow-sm sticky top-0 z-10">
                        <div className="max-w-md mx-auto px-4 py-3 flex justify-between items-start">
                            <div className="flex flex-col">
                                <h1 className="text-xl font-bold text-indigo-600 leading-tight">Репетиції</h1>
                                <div className="flex items-center gap-1 mt-2 bg-gray-50 rounded-lg p-0.5 border border-gray-200 w-max shadow-sm">
                                    <button onClick={() => setWeekOffset(prev => prev - 1)} disabled={weekOffset <= 0} className="p-1 rounded-md hover:bg-white hover:shadow-sm disabled:opacity-30 text-gray-600"><IconChevronLeft size={16} /></button>
                                    <span className="text-[11px] sm:text-xs font-bold text-gray-700 min-w-[125px] text-center">{currentWeekInfo.label}</span>
                                    <button onClick={() => setWeekOffset(prev => prev + 1)} disabled={isNextWeekLimit} className="p-1 rounded-md hover:bg-white hover:shadow-sm disabled:opacity-30 text-gray-600"><IconChevronRight size={16} /></button>
                                </div>
                            </div>
                            <div className="flex items-center gap-2 mt-0.5">
                                {isAdmin && (
                                    <button onClick={() => setTgModalOpen(true)} className="p-2 rounded-full bg-blue-50 text-blue-500 hover:bg-blue-100 border border-blue-100 shadow-sm"><IconTelegram size={18} /></button>
                                )}
                                <button onClick={toggleAdminLogin} className={`p-2 rounded-full transition-colors ${isAdmin ? 'bg-rose-100 text-rose-600' : 'bg-gray-100 text-gray-400'}`}><IconShield size={18} /></button>
                                {profile && (
                                    <div className="flex items-center gap-2 bg-indigo-50 px-3 py-1.5 rounded-full border border-indigo-100" onClick={logOut}>
                                        <IconUser size={16} className="text-indigo-500" />
                                        <span className="text-sm font-medium text-indigo-700 hidden sm:inline">{profile.className}</span>
                                    </div>
                                )}
                            </div>
                        </div>
                        <div className="flex overflow-x-auto hide-scrollbar border-t border-gray-100 bg-white px-2 py-2 max-w-md mx-auto">
                            {DAYS.map(day => (
                                <button key={day.id} onClick={() => setSelectedDay(day.id)} className={`flex-1 min-w-[60px] mx-1 py-2 rounded-xl text-sm font-medium ${selectedDay === day.id ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-100 text-gray-600'}`}>{day.short}</button>
                            ))}
                        </div>
                        <div className="flex p-3 gap-2 bg-gray-50 border-b border-gray-200 max-w-md mx-auto">
                            {HALLS.map(hall => (
                                <button key={hall.id} onClick={() => setSelectedHall(hall.id)} className={`flex-1 py-2.5 rounded-lg text-sm font-semibold flex items-center justify-center gap-2 ${selectedHall === hall.id ? 'bg-white text-indigo-700 border-2 border-indigo-500 shadow-sm' : 'bg-white text-gray-500 border-2 border-transparent'}`}><IconMapPin size={16} />{hall.name}</button>
                            ))}
                        </div>
                    </header>

                    <main className="max-w-md mx-auto px-4 py-4 space-y-3">
                        {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(lessonNum => {
                            const booking = currentViewRehearsals.find(r => r.lesson === lessonNum);
                            const isMyBooking = booking && user && booking.uid === user.uid;
                            const canDelete = isMyBooking || isAdmin;
                            return (
                                <div key={lessonNum} className={`p-4 rounded-2xl shadow-sm border ${booking ? 'bg-white border-gray-200' : 'bg-indigo-50/50 border-dashed border-indigo-200 cursor-pointer hover:bg-indigo-50'}`} onClick={() => !booking && handleSlotClick(lessonNum)}>
                                    <div className="flex justify-between items-start">
                                        <div className="flex items-center gap-3">
                                            <div className="flex flex-col items-center w-[75px] flex-shrink-0">
                                                <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm mb-1 ${booking ? (booking.danceType === 'custom' ? 'bg-rose-100 text-rose-600' : 'bg-gray-100 text-gray-500') : 'bg-indigo-100 text-indigo-600'}`}>{lessonNum}</div>
                                                <span className="text-[10px] text-gray-500 font-semibold whitespace-nowrap">{LESSON_TIMES[lessonNum]}</span>
                                            </div>
                                            <div>
                                                {booking ? (
                                                    <>
                                                        <h3 className={`font-bold text-lg leading-none mb-1 ${booking.danceType === 'custom' ? 'text-rose-700' : 'text-gray-800'}`}>{booking.className}</h3>
                                                        {booking.danceType !== 'custom' ? <p className="text-xs text-gray-500 font-medium bg-gray-100 px-2 py-0.5 rounded-md inline-block mb-1">{DANCE_TYPES.find(d => d.id === booking.danceType)?.name}</p> : <p className="text-xs text-rose-600 font-bold bg-rose-50 border border-rose-200 px-2 py-0.5 rounded-md inline-block mb-1">Спеціальна подія</p>}
                                                        <p className="text-sm text-gray-600 flex items-center gap-1 mt-1"><IconUser size={12} /> {booking.responsibleName}</p>
                                                        {booking.createdAt && <p className="text-[11px] text-gray-400 flex items-center gap-1 mt-1"><IconClock size={10} />{new Date(booking.createdAt).toLocaleString('uk-UA', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })}</p>}
                                                    </>
                                                ) : <div className="h-8 flex items-center"><span className="text-indigo-500 font-medium">Вільне місце</span></div>}
                                            </div>
                                        </div>
                                        {booking ? canDelete && <button onClick={(e) => { e.stopPropagation(); handleDelete(booking.id); }} className="p-2 text-red-400 hover:text-red-600 hover:bg-red-50 rounded-full transition-colors"><IconTrash size={20} /></button> : <div className="p-2 text-indigo-400"><IconPlus size={20} /></div>}
                                    </div>
                                </div>
                            );
                        })}
                    </main>

                    {/* Модалки (Авторизація, Адмін, Бронювання, Telegram, Повідомлення) залишаються без змін */}
                    {authModalOpen && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
                                <h2 className="text-2xl font-bold text-gray-800 mb-2">Привіт! 👋</h2>
                                <p className="text-sm text-gray-500 mb-6">Оберіть ваш клас та введіть ім'я.</p>
                                <div className="space-y-4">
                                    <select id="class-select" className="w-full p-3 border border-gray-300 rounded-xl outline-none bg-white"><option value="" disabled selected>Оберіть клас...</option>{CLASSES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                                    <input id="name-input" type="text" placeholder="Ваше ім'я" className="w-full p-3 border border-gray-300 rounded-xl outline-none" />
                                    <button onClick={saveProfile} className="w-full py-3 bg-indigo-600 text-white rounded-xl font-bold mt-4">Зберегти</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {adminLoginModalOpen && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
                                <h2 className="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2"><IconShield className="text-rose-500" /> Вхід Адміна</h2>
                                <input id="admin-pwd-input" type="password" placeholder="Пароль" className="w-full p-3 border border-gray-300 rounded-xl outline-none mb-4" />
                                <button onClick={handleAdminLogin} className="w-full py-3 bg-rose-600 text-white rounded-xl font-bold">Увійти</button>
                                <button onClick={() => setAdminLoginModalOpen(false)} className="w-full py-2 text-gray-400 mt-2 text-sm">Скасувати</button>
                            </div>
                        </div>
                    )}

                    {bookingModal.open && (
                        <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center p-0 sm:p-4 z-50 backdrop-blur-sm">
                            <div className="bg-white rounded-t-3xl sm:rounded-2xl p-6 w-full max-w-sm shadow-xl animate-slide-up overflow-y-auto max-h-[90vh]">
                                <div className="flex justify-between items-center mb-4"><h2 className="text-xl font-bold">Бронювання</h2><button onClick={() => setBookingModal({open: false, lesson: null})} className="text-gray-400 text-xl">✕</button></div>
                                <div className="mb-6 bg-gray-50 p-3 rounded-xl border border-gray-100 text-sm">
                                    <p className="font-medium">{DAYS.find(d=>d.id===selectedDay)?.name}, {bookingModal.lesson} урок</p>
                                    <p className="font-medium">{HALLS.find(h=>h.id===selectedHall)?.name} зал</p>
                                </div>
                                {isAdmin && (
                                    <div className="mb-4 bg-rose-50 p-3 rounded-xl border border-rose-200">
                                        <label className="block text-sm font-bold text-rose-700 mb-2">Статус від Адміна:</label>
                                        <input type="text" value={adminCustomEventText} onChange={(e) => setAdminCustomEventText(e.target.value)} placeholder="Напр: Денс-батл" className="w-full p-2.5 border border-rose-300 rounded-lg outline-none" />
                                    </div>
                                )}
                                <div className={`${isAdmin && adminCustomEventText ? 'opacity-30' : ''}`}>
                                    <label className="block text-sm font-medium mb-2">Тип танцю:</label>
                                    <div className="space-y-2 mb-6">{DANCE_TYPES.map(type => (
                                        <label key={type.id} className="flex items-center p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50">
                                            <input type="radio" name="danceType" value={type.id} defaultChecked={type.id === DANCE_TYPES[0].id} className="w-5 h-5 text-indigo-600" />
                                            <span className="ml-3 font-medium">{type.name}</span>
                                        </label>
                                    ))}</div>
                                </div>
                                <button onClick={confirmBooking} className={`w-full py-3.5 text-white rounded-xl font-bold ${isAdmin && adminCustomEventText ? 'bg-rose-600' : 'bg-indigo-600'}`}>Підтвердити</button>
                            </div>
                        </div>
                    )}

                    {tgModalOpen && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-xl">
                                <div className="flex justify-between items-center mb-4"><h2 className="text-xl font-bold flex items-center gap-2"><IconTelegram className="text-blue-500" /> Telegram</h2><button onClick={() => setTgModalOpen(false)} className="text-gray-400">✕</button></div>
                                {!tgChatId ? (
                                    <div className="space-y-4">
                                        <div className="bg-blue-50 p-3 rounded-xl text-sm">Напишіть /start у групі та натисніть кнопку нижче.</div>
                                        <button onClick={findTgGroup} disabled={tgLoading} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">{tgLoading ? 'Шукаю...' : 'Знайти групу'}</button>
                                    </div>
                                ) : (
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-xs bg-gray-50 p-2 rounded-lg"><span>Група: {tgChatTitle}</span><button onClick={() => { localStorage.removeItem('tg_chat_id'); setTgChatId(null); }} className="text-red-500 underline">Змінити</button></div>
                                        <select value={tgWeekOffset} onChange={(e) => setTgWeekOffset(Number(e.target.value))} className="w-full p-2 border border-gray-300 rounded-lg text-sm mb-2 outline-none">
                                            {availableWeeks.map(w => <option key={w.offset} value={w.offset}>{w.label}</option>)}
                                        </select>
                                        <div className="flex flex-wrap gap-2 mb-4">
                                            <button onClick={() => setTgDays(['all'])} className={`px-2 py-1 rounded-md text-[10px] font-bold ${tgDays.includes('all') ? 'bg-blue-600 text-white' : 'bg-gray-100'}`}>Весь тиждень</button>
                                            {DAYS.map(d => <button key={d.id} onClick={() => { let n = tgDays.includes('all') ? [] : [...tgDays]; n = n.includes(d.id) ? n.filter(id=>id!==d.id) : [...n, d.id]; if(!n.length || n.length===5) n=['all']; setTgDays(n); }} className={`px-2 py-1 rounded-md text-[10px] font-bold ${!tgDays.includes('all') && tgDays.includes(d.id) ? 'bg-blue-600 text-white' : 'bg-gray-100'}`}>{d.short}</button>)}
                                        </div>
                                        <button onClick={sendTgMessage} disabled={tgLoading} className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold">Відправити графік</button>
                                        {activeTgMessage && <button onClick={deleteTgMessage} className="w-full py-2 text-red-500 text-xs font-bold mt-2">🗑 Видалити старе повідомлення</button>}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {messageModal.open && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-xs shadow-xl text-center">
                                <div className="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4"><IconInfo size={24} /></div>
                                <h2 className="text-xl font-bold mb-2">{messageModal.title}</h2>
                                <p className="text-gray-600 mb-6 text-sm">{messageModal.text}</p>
                                <button onClick={() => setMessageModal({open: false, title: '', text: ''})} className="w-full py-2.5 bg-gray-100 rounded-xl font-bold">Зрозуміло</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
